name: KinFlash
options:
  bundleIdPrefix: com.billdonner
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.4.1"

targets:
  KinFlash:
    type: application
    platform: iOS
    sources:
      - KinFlash
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.billdonner.kinflash
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "50"
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UILaunchScreen_ImageName: LaunchIcon
        INFOPLIST_KEY_UILaunchScreen_BackgroundColor: LaunchBackground
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: true
        DEVELOPMENT_TEAM: NEAY582ME4
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: KinFlash/KinFlash.entitlements
    dependencies:
      - package: GRDB
    scheme:
      testTargets:
        - KinFlashTests

  KinFlashTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    resources:
      - path: KinFlash/Resources
        buildPhase: resources
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
        DEVELOPMENT_TEAM: NEAY582ME4
        CODE_SIGN_IDENTITY: "Apple Development"
    dependencies:
      - target: KinFlash
      - package: GRDB
